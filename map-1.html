<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Volt Vibe Map</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #eef2f3;
}

/* Navbar */
.navbar {
  background: #ffffff;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ddd;
}

.navbar h1 {
  margin: 0;
  font-size: 20px;
}

.navbar a {
  text-decoration: none;
  color: #555;
}

/* Center container */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 70px);
}

/* Map box */
.map-box {
  width: 75%;
}

/* Title */
.title {
  margin-bottom: 10px;
  color: #333;
  font-weight: 500;
}

/* Map iframe */
.map-frame {
  width: 100%;
  height: 550px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h1>Volt Vibe</h1>
  <a href="index.html">Home</a>
</div>

<!-- MAIN -->
<div class="container">

  <div class="map-box">

    <div class="title">Nearby Charging Stations</div>

    <iframe
      src="https://map.openchargemap.io"
      class="map-frame"
      allow="geolocation">
    </iframe>

  </div>

</div>

</body>
</html>
