<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">

<title>Volt Vibe</title>
<script src="./script-1.js" defer></script>

<style>
body { font-family: 'Poppins', sans-serif; }
.glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.6);
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-green-50">

<!-- NAVBAR -->
<nav class="glass shadow-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center space-x-2">
<img src="./VV_Logo_2-removebg-preview.png" class="h-10">
<h1 class="text-xl font-semibold tracking-wide">Volt Vibe</h1>
</div>

<div class="hidden md:flex space-x-8 text-gray-700">
<a href="./map-1.html" class="hover:text-green-600 transition">Stations</a>
<button onclick="jokey()" class="hover:text-green-600 transition">Joke</button>
</div>

<button onclick="toggleMenu()" class="md:hidden text-xl">☰</button>
</div>

<div id="mobileMenu" class="hidden px-6 pb-4">
<a href="./map-1.html" class="block py-2">Stations</a>
<button onclick="jokey()" class="block py-2">Joke</button>
</div>
</nav>

<!-- HERO -->
<section class="max-w-7xl mx-auto px-6 py-16 flex flex-col lg:flex-row items-center gap-10">

<div class="lg:w-1/2 space-y-6">
<h1 class="text-5xl font-semibold leading-tight">
Stay <span class="text-green-500">Charged</span> Always
</h1>

<p class="text-gray-600 text-lg">
Locate EV charging stations instantly and keep your journey uninterrupted.
</p>

<a href="./map-1.html"
class="inline-block bg-green-500 text-white px-8 py-3 rounded-lg shadow-lg hover:scale-105 transform transition">
Explore Stations
</a>
</div>

<div class="lg:w-1/2">
<video class="rounded-xl shadow-2xl" autoplay muted loop>
<source src="./Electric Vehicle Charging Station Demo.mp4">
</video>
</div>

</section>

<!-- MODAL -->
<div id="myModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-xl max-w-md w-full text-center animate-fadeIn">
<span onclick="closeModal()" class="float-right cursor-pointer text-xl">&times;</span>

<h2 class="text-xl font-semibold mb-4">Quick Break 😄</h2>
<p id="jokeText" class="text-gray-700"></p>

</div>
</div>

<!-- FOOTER -->
<footer class="text-center py-6 text-gray-500">
© 2026 Volt Vibe
</footer>

</body>
</html>
